# nginx config for the SNP demo container.
# Mounted at /etc/nginx/conf.d/default.conf inside the snp-demo container.
# Sits behind the host nginx which terminates TLS and proxies /demo/ here.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow embedding the demo in iframes from the landing site / portal.
    add_header X-Frame-Options "SAMEORIGIN" always;

    # MP3 narration files — long cache, no transforms.
    location ~* \.(mp3|wav|ogg)$ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Static assets — short cache so we can iterate fast.
    location ~* \.(css|js|svg|png|jpg|jpeg|webp|ico)$ {
        access_log off;
        expires 1h;
    }

    # Default — serve the file, fall back to the selector index.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
